<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* INTRO SCREEN */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 30% 30%, rgba(255,0,0,0.2), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,0.15), transparent 40%),
        linear-gradient(135deg, #000, #3b0000, #111);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* COUNT */
.count {
    position: absolute;
    font-size: 18vw;
    color: white;
}

/* DROP */
@keyframes drop {
    0% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    60% { transform: translateY(20px); opacity: 1; }
    100% { transform: translateY(0); }
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(0); }
    25% { transform: translate(-3px,3px); }
    50% { transform: translate(3px,-3px); }
    75% { transform: translate(-3px,-3px); }
    100% { transform: translate(3px,3px); }
}

/* PHOTO CENTER */
.photo {
    position: absolute;
    right: -300px;
    opacity: 0;
}

.photo img {
    width: 220px;
    max-width: 40vw;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(255,0,0,0.7);
}

/* SLIDE CENTER */
@keyframes slideCenter {
    0% { right: -300px; opacity: 0; }
    100% { right: 50%; transform: translateX(50%); opacity: 1; }
}

/* MOVE TO CORNER */
@keyframes toCorner {
    0% { right: 50%; transform: translateX(50%) scale(1); }
    100% {
        right: 15px;
        top: 15px;
        transform: scale(0.5);
    }
}

/* FADE INTRO */
.fade-out {
    animation: fadeOut 1.5s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* PORTFOLIO */
.portfolio {
    position: relative;
    padding: 20px;
    display: none;
}

/* SHOW PORTFOLIO */
.show {
    display: block;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* PROFILE CORNER IMAGE */
.profile {
    position: fixed;
    top: 15px;
    right: 15px;
}

.profile img {
    width: 80px;
    border-radius: 50%;
}

/* MOBILE */
@media (max-width: 600px) {
    .count {
        font-size: 25vw;
    }

    .photo img {
        width: 160px;
    }

    .profile img {
        width: 60px;
    }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
    <div class="count" id="count">1</div>
    <div class="photo" id="photo">
        <img src="your-photo.jpg">
    </div>
</div>

<!-- PORTFOLIO -->
<div class="portfolio" id="portfolio">
    <div class="header">
        <h1>My Portfolio</h1>
    </div>

    <div class="profile">
        <img src="your-photo.jpg">
    </div>

    <p style="margin-top:80px;">
        Welcome to my portfolio. Add your content here.
    </p>
</div>

<script>
let count = document.getElementById("count");
let photo = document.getElementById("photo");
let intro = document.getElementById("intro");
let portfolio = document.getElementById("portfolio");

let num = 1;

function nextNumber() {
    if (num <= 3) {
        count.innerText = num;

        count.style.animation = "none";
        setTimeout(() => {
            count.style.animation = "drop 0.5s ease-out, shake 0.2s 3";
        }, 10);

        num++;
        setTimeout(nextNumber, 1000);
    } else {
        count.style.display = "none";

        // Show photo
        photo.style.opacity = 1;
        photo.style.animation = "slideCenter 1s forwards";

        // Wait 3 sec
        setTimeout(() => {

            // Move photo to corner
            photo.style.animation = "toCorner 1s forwards";

            // Show portfolio behind
            portfolio.classList.add("show");

            // Fade intro background only
            intro.classList.add("fade-out");

        }, 3000);
    }
}

nextNumber();
</script>

</body>
</html>
